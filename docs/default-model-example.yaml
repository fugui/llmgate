# 默认模型 Fallback 配置示例
# 当客户端请求的模型没有可用后端时，自动使用默认模型

server:
    port: 8080
    mode: release

database:
    path: modelgate.db

# 配置默认模型：当请求的模型没有可用后端时，使用此模型作为 fallback
# 示例场景：
# 1. 客户端请求 "gpt-4"，但只配置了 kimi2.5 的后端
# 2. 系统自动使用 kimi2.5 的后端来处理请求
# 3. 日志会记录："using fallback model kimi2.5 for request model gpt-4"
default_model: "kimi2.5"

models:
    - id: kimi2.5
      name: Kimi 2.5
      description: Moonshot Kimi 2.5
      enabled: true
      model_params:
        max_tokens: 4096
        temperature: 0.7
      backends:
        - id: kimi2.5-gz-01
          name: 广州节点-01
          base_url: https://api.kimi.com/v1
          api_key: sk-your-api-key
          model_name: kimi-for-coding
          weight: 20
          region: guangzhou
          enabled: true

    # 这个模型没有配置后端，请求它会 fallback 到 kimi2.5
    - id: gpt-4
      name: GPT-4
      description: OpenAI GPT-4 (fallback to kimi2.5)
      enabled: true
      model_params:
        max_tokens: 4096
      backends: []  # 空后端列表

    # 这个模型配置了后端但都被禁用，请求它也会 fallback 到 kimi2.5
    - id: qwen3.5
      name: Qwen 3.5
      description: 通义千问 3.5
      enabled: true
      backends:
        - id: qwen3.5-prod
          name: 生产节点
          base_url: http://qwen35.internal:8000
          api_key: ""
          model_name: qwen3.5-instruct
          weight: 10
          enabled: false  # 禁用的后端

quota_policies:
    - name: default
      rate_limit: 60
      rate_limit_window: 60
      request_quota_daily: 500
      models:
        - '*'
      description: 默认策略

admin:
    default_email: admin@modelgate.local
    default_password: admin123

logs:
    path: logs
    retention_days: 7
